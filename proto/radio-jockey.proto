syntax = "proto3";

option go_package = "server/src/proto";

service RadioService {
  rpc Ping (PingRequest) returns (PingResponse) {}

  rpc CreateSession (CreateSessionRequest) returns (CreateSessionResponse) {}
  rpc AddTrack (AddTrackRequest) returns (AddTrackResponse) {}
  rpc RemoveTrack (RemoveTrackRequest) returns (RemoveTrackResponse) {}
  rpc SkipTrack (SkipTrackRequest) returns (SkipTrackResponse) {}
  rpc ListQueue (ListQueueRequest) returns (ListQueueResponse) {}
}

message PingRequest {}
message PingResponse {
  string message = 1;
}

message CreateSessionRequest {
  string session_id = 1;
}
message CreateSessionResponse {
  string stream_url = 1;
}

message AddTrackRequest {
  string session_id = 1;
  string track_url = 2;
}
message AddTrackResponse {
  Track track = 1;
}

message RemoveTrackRequest {
  string session_id = 1;
  uint32 index = 2;
}
message RemoveTrackResponse {}

message SkipTrackRequest {
  string session_id = 1;
}
message SkipTrackResponse {}

message ListQueueRequest {
  string session_id = 1;
}
message ListQueueResponse {
  repeated Track tracks = 1;
}

message Track {
  int64 id = 1;
  string source = 2;
  string source_id = 3;
  string title = 4;
  string artist = 5;
  int64 duration = 6;
}
