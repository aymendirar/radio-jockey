syntax = "proto3";

option go_package = "server/src/proto";

service RadioService {
  rpc Ping (PingRequest) returns (PingResponse) {}

  rpc RequestNonce(RequestNonceRequest) returns (RequestNonceResponse) {}
  rpc RespondNonce(RespondNonceRequest) returns (RespondNonceResponse) {}

  rpc CreateSession (CreateSessionRequest) returns (CreateSessionResponse) {}
  rpc GetSession (GetSessionRequest) returns (GetSessionResponse) {}
  rpc DeleteSessionAuth (DeleteSessionAuthRequest) returns (DeleteSessionAuthResponse) {}
  rpc AddTrack (AddTrackRequest) returns (AddTrackResponse) {}
  rpc RemoveTrack (RemoveTrackRequest) returns (RemoveTrackResponse) {}
  rpc SkipTrack (SkipTrackRequest) returns (SkipTrackResponse) {}
  rpc ListQueue (ListQueueRequest) returns (ListQueueResponse) {}
  rpc ListSessions (ListSessionsRequest) returns (ListSessionsResponse) {}

  rpc ListSessionArchives (ListSessionArchivesRequest) returns (ListSessionArchivesResponse) {}
  rpc GetSessionArchive (GetSessionArchiveRequest) returns (GetSessionArchiveResponse) {}
  rpc DeleteSessionArchive (DeleteSessionArchiveRequest) returns (DeleteSessionArchiveResponse) {}
}

message PingRequest {}
message PingResponse {
  string message = 1;
}

message CreateSessionRequest {
  string session_id = 1;
  bool archive = 2;
}
message CreateSessionResponse {
  string stream_url = 1;
}

message GetSessionRequest {
  string session_id = 1;
}
message GetSessionResponse {
  string stream_url = 1;
}

message RequestNonceRequest { }
message RequestNonceResponse {
  string nonce = 1;
}

message RespondNonceRequest {
  string pass_key = 1;
}
message RespondNonceResponse {
  string auth_token = 1;
}

message DeleteSessionAuthRequest {
  string session_id = 1;
}
message DeleteSessionAuthResponse { }

message AddTrackRequest {
  string session_id = 1;
  string track_url = 2;
}
message AddTrackResponse {
  Track track = 1;
}

message RemoveTrackRequest {
  string session_id = 1;
  uint32 index = 2;
}
message RemoveTrackResponse {}

message SkipTrackRequest {
  string session_id = 1;
}
message SkipTrackResponse {}

message ListQueueRequest {
  string session_id = 1;
}
message ListQueueResponse {
  repeated Track tracks = 1;
}

message ListSessionsRequest {}
message ListSessionsResponse {
  repeated SessionInfo sessions = 1;
}

message SessionInfo {
  string session_id = 1;
  string stream_url = 2;
}

message Track {
  int64 id = 1;
  string source = 2;
  string source_id = 3;
  string title = 4;
  string artist = 5;
  int64 duration = 6;
  string album_art_url = 7;
}

message SessionArchiveInfo {
  int64 id = 1;
  string session_id = 2;
  int64 created_at = 3;
}

message ListSessionArchivesRequest {}
message ListSessionArchivesResponse {
  repeated SessionArchiveInfo archives = 1;
}

message GetSessionArchiveRequest {
  int64 id = 1;
}
message GetSessionArchiveResponse {
  int64 id = 1;
  string session_id = 2;
  int64 created_at = 3;
  repeated Track tracks = 4;
}

message DeleteSessionArchiveRequest {
  int64 id = 1;
}
message DeleteSessionArchiveResponse {}
