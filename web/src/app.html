<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>radio jockey</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div class="bg-grid" aria-hidden="true"></div>
		<div class="content">%sveltekit.body%</div>
	</body>
</html>

<style>
	html {
		font-family: 'Courier New', monospace;
		font-weight: bold;
	}

	h1 {
		display: flex;
		flex-wrap: wrap;
		align-items: center;
		justify-content: center;
		gap: 6px 8px;
		font-size: 40px;
	}

	.wave-1 {
		font-size: 22px;
	}

	.wave-2 {
		font-size: 16px;
	}

	.wave-3 {
		font-size: 11px;
	}

	@media (max-width: 600px) {
		h1 {
			font-size: 24px;
		}

		.wave-1 {
			font-size: 17px;
		}

		.wave-2 {
			font-size: 12px;
		}

		.wave-3 {
			font-size: 8px;
		}

		h2 {
			font-size: 20px;
		}

		h3 {
			font-size: 18px;
		}
	}

	p,
	ul,
	ol,
	label {
		font-size: 16px;
	}

	body {
		margin: 16px;
		background-color: #01026f;
		color: white;
		position: relative;
		line-height: 24px;
	}

	.bg-grid {
		position: fixed;
		inset: 0;
		background-image: url('/radio.png');
		background-size: 80px 80px;
		background-repeat: space;
		opacity: 0.3;
		pointer-events: none;
		z-index: 0;
	}

	.content {
		position: relative;
		z-index: 1;
		/* svh (not vh) — vh is measured with mobile browser chrome hidden, which overshoots
		   the actually-visible height when the address bar is shown, pushing the footer
		   past the fold */
		min-height: calc(100svh - 32px);
		box-sizing: border-box;
		border: 1px solid white;
		padding: 16px 32px;
		display: flex;
		flex-direction: column;
	}

	a,
	a:visited,
	a:hover,
	a:active {
		color: inherit;
		text-decoration: none;
	}

	a:hover {
		text-decoration: underline;
	}

	h2,
	h3 {
		font-family: 'Courier New', monospace;
	}

	p {
		margin: 12px 0;
	}

	.panel {
		border: 1px solid white;
		padding: 16px;
		margin-bottom: 24px;
	}

	form {
		border: 1px solid white;
		padding: 16px;
		margin-bottom: 24px;
		display: flex;
		flex-direction: column;
		gap: 12px;
	}

	ul,
	ol {
		list-style: none;
		border: 1px solid white;
		padding: 0;
		margin: 0 0 24px 0;
	}

	li {
		display: flex;
		flex-wrap: wrap;
		align-items: center;
		gap: 8px;
		padding: 16px;
	}

	li:not(:last-child) {
		box-shadow: 0 1px 0 white;
	}

	ol {
		counter-reset: list-counter;
	}

	ol > li {
		counter-increment: list-counter;
	}

	ol > li::before {
		content: counter(list-counter) '.';
	}

	button,
	input {
		font-family: inherit;
		font-size: 16px;
		font-weight: bold;
		background: transparent;
		color: white;
		border: 1px solid white;
		padding: 6px 10px;
	}

	button:hover {
		text-decoration: underline;
	}
</style>
