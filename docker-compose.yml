services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
      - 443:443/udp
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
    depends_on:
      web:
        condition: service_started
      server:
        condition: service_healthy

  web:
    build: ./web
    restart: unless-stopped
    env_file: ./web/.env
    depends_on:
      server:
        condition: service_healthy

  discord-jockey:
    build: ./discord-jockey
    platform: linux/amd64
    restart: unless-stopped
    env_file: ./discord-jockey/.env
    depends_on:
      server:
        condition: service_healthy

  server:
    build: ./server
    restart: unless-stopped
    env_file: ./server/.env
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "12625"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./server/data:/server/data
      - ./server/music:/server/music

  icecast:
    image: pltnk/icecast2
    platform: linux/amd64
    container_name: icecast2
    restart: always
    env_file: ./icecast/.env
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    volumes:
      - ./icecast/icecast.xml:/etc/icecast2/icecast.xml
      - ./icecast/entrypoint.sh:/entrypoint.sh

  codegen:
    build: ./codegen
    platform: linux/amd64
    profiles: ["codegen"]
    volumes:
      - ./proto:/codegen/proto
      - ./server/src/proto:/codegen/server/src/proto
      - ./discord-jockey/src/proto:/codegen/discord-jockey/src/proto
      - ./web/src/lib/proto:/codegen/web/src/lib/proto
      - ./codegen/scripts:/codegen/scripts
    command: sh /codegen/scripts/update_protos.sh

  server-test:
    build:
      context: ./server
      target: test
    profiles: ["test"]
