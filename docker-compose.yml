services:
  web:
    build: ./web
    env_file: ./web/.env
    ports:
      - 3000:3000
    depends_on:
      server:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./web/src
        - action: sync+restart
          path: ./web/.env
          target: /web/.env
        - action: rebuild
          path: ./web/package.json

  discord-jockey:
    build: ./discord-jockey
    env_file: ./discord-jockey/.env
    depends_on:
      server:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./discord-jockey/src
        - action: sync+restart
          path: ./discord-jockey/.env
          target: /discord-jockey/.env
        - action: rebuild
          path: ./discord-jockey/package.json

  server:
    build: ./server
    env_file: ./server/.env
    ports:
      - 12625:12625
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "12625"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./server/data:/server/data
      - ./server/music:/server/music
    develop:
      watch:
        - action: rebuild
          path: ./server/src
        - action: sync+restart
          path: ./server/.env
          target: /server/.env
        - action: rebuild
          path: ./server/go.mod

  # it's a little complicated to get this service to be "watch"-ed, so just docker compose restart icecast
  icecast:
    image: pltnk/icecast2
    platform: linux/amd64
    container_name: icecast2
    restart: always
    env_file: ./icecast/.env
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    ports:
      - 9999:9999
    volumes:
      - ./icecast/icecast.xml:/etc/icecast2/icecast.xml
      - ./icecast/entrypoint.sh:/entrypoint.sh

  codegen:
    build: ./codegen
    platform: linux/amd64
    volumes:
      - ./proto:/codegen/proto
      - ./server/src/proto:/codegen/server/src/proto
      - ./discord-jockey/src/proto:/codegen/discord-jockey/src/proto
      - ./web/src/lib/proto:/codegen/web/src/lib/proto
      - ./codegen/scripts:/codegen/scripts
    command: sh /codegen/scripts/update_protos.sh
